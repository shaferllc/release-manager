# Build Release Manager on version tags and attach installers to GitHub Releases.
# Push a tag (e.g. v0.1.1) to trigger, or run manually from the Actions tab.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.2.3). Used when run manually.'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag or input
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          fi
          npm pkg set version="$VER"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Building version $VER"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: npm ci || npm install

      - name: Build app
        env:
          LICENSE_PROD_CLIENT_ID: ${{ secrets.LICENSE_PROD_CLIENT_ID }}
          LICENSE_PROD_CLIENT_SECRET: ${{ secrets.LICENSE_PROD_CLIENT_SECRET }}
          LICENSE_STAGING_CLIENT_ID: ${{ secrets.LICENSE_STAGING_CLIENT_ID }}
          LICENSE_STAGING_CLIENT_SECRET: ${{ secrets.LICENSE_STAGING_CLIENT_SECRET }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run build

      - name: List build output
        shell: bash
        run: ls -la dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List built files
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.build.outputs.version) || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.build.outputs.version) || github.ref_name }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README latest version
        shell: bash
        run: |
          VER="${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.build.outputs.version) || github.ref_name }}"
          sed -i "s/\*\*Latest:\*\* v[0-9][0-9.]*/\*\*Latest:\*\* ${VER}/" README.md

      - name: Commit and push README
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update README latest version to ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.build.outputs.version) || github.ref_name }}"
            git push
          fi
